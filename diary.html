<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mood Vibes</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Figtree',sans-serif;
}

body{
    --c1:#ff6b6b;
    --c2:#feca57;
    --c3:#48dbfb;
    --c4:#5f27cd;

    min-height:100vh;
    overflow:hidden;

    display:flex;
    justify-content:center;
    align-items:center;

    background:
    linear-gradient(
        -45deg,
        var(--c1),
        var(--c2),
        var(--c3),
        var(--c4)
    );

    background-size:400% 400%;
    animation:gradientMove 15s ease infinite;
    transition:all .5s ease;
}

@keyframes gradientMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.blur{
    position:fixed;
    width:500px;
    height:500px;
    border-radius:50%;
    filter:blur(120px);
    opacity:.35;
    z-index:0;
    animation:float 10s ease-in-out infinite;
}

.blur1{
    background:white;
    top:-150px;
    left:-150px;
}

.blur2{
    background:#00e5ff;
    bottom:-150px;
    right:-150px;
}

@keyframes float{
    50%{
        transform:translate(60px,-40px);
    }
}

.background-overlay{
    position:fixed;
    inset:0;

    background:
    linear-gradient(
        rgba(0,0,0,.35),
        rgba(0,0,0,.55)
    );

    backdrop-filter:
    blur(30px)
    saturate(140%);

    -webkit-backdrop-filter:
    blur(30px)
    saturate(140%);

    z-index:1;
}

.container{
    position:relative;
    z-index:2;

    width:min(90%,500px);

    padding:35px;

    border-radius:30px;

    background:
    linear-gradient(
        135deg,
        rgba(255,255,255,.12),
        rgba(255,255,255,.04)
    );

    backdrop-filter:
    blur(25px);

    -webkit-backdrop-filter:
    blur(25px);

    border:1px solid rgba(255,255,255,.12);

    box-shadow:
    0 10px 40px rgba(0,0,0,.25);

    text-align:center;

    color:white;
}

h1{
    font-size:2.5rem;
    margin-bottom:10px;
}

.subtitle{
    opacity:.8;
    margin-bottom:25px;
}

.buttons{
    display:flex;
    flex-direction:column;
    gap:12px;
    width:100%;
}

button{
    width:100%;

    border:none;
    outline:none;
    cursor:pointer;

    padding:15px;

    border-radius:18px;

    color:white;
    font-size:1rem;
    font-weight:600;

    background:
    linear-gradient(
        135deg,
        rgba(255,255,255,.18),
        rgba(255,255,255,.05)
    );

    backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px);

    border:1px solid rgba(255,255,255,.15);

    transition:.3s ease;
}

button:hover{
    transform:translateY(-3px) scale(1.02);

    background:
    linear-gradient(
        135deg,
        rgba(255,255,255,.25),
        rgba(255,255,255,.08)
    );
}

#moodText{
    margin-top:25px;
    font-size:1.2rem;
    font-weight:600;
    min-height:60px;
}

@media(max-width:600px){

    .container{
        width:92%;
        padding:25px;
    }

    h1{
        font-size:2rem;
    }
}
</style>
</head>
<body>

<div class="blur blur1"></div>
<div class="blur blur2"></div>

<div class="background-overlay"></div>

<div class="container">
    <h1>✨ Mood Vibes</h1>

    <p class="subtitle">
        How are you feeling today?
    </p>

    <div class="buttons">
        <button onclick="setMood('happy')">😊 Happy</button>
        <button onclick="setMood('sad')">😔 Sad</button>
        <button onclick="setMood('angry')">😡 Angry</button>
        <button onclick="setMood('calm')">😌 Calm</button>
        <button onclick="setMood('excited')">🤩 Excited</button>
    </div>

    <div id="moodText">
        Select a mood above ✨
    </div>
</div>

<script>
const moodText = document.getElementById("moodText");

function setMood(mood){

    switch(mood){

        case "happy":
            document.body.style.setProperty("--c1","#FFD93D");
            document.body.style.setProperty("--c2","#FF6B6B");
            document.body.style.setProperty("--c3","#FF9FF3");
            document.body.style.setProperty("--c4","#F368E0");

            moodText.innerHTML =
            "☀️ You're radiating positive energy today!";
            break;

        case "sad":
            document.body.style.setProperty("--c1","#0F2027");
            document.body.style.setProperty("--c2","#203A43");
            document.body.style.setProperty("--c3","#2C5364");
            document.body.style.setProperty("--c4","#4CA1AF");

            moodText.innerHTML =
            "🌧️ It's okay to slow down. Better days are coming.";
            break;

        case "angry":
            document.body.style.setProperty("--c1","#8B0000");
            document.body.style.setProperty("--c2","#B22222");
            document.body.style.setProperty("--c3","#FF0000");
            document.body.style.setProperty("--c4","#FF416C");

            moodText.innerHTML =
            "🔥 Take a breath. You are stronger than your anger.";
            break;

        case "calm":
            document.body.style.setProperty("--c1","#43CEA2");
            document.body.style.setProperty("--c2","#185A9D");
            document.body.style.setProperty("--c3","#6DD5ED");
            document.body.style.setProperty("--c4","#2193B0");

            moodText.innerHTML =
            "🌿 Peace looks good on you.";
            break;

        case "excited":
            document.body.style.setProperty("--c1","#FF9966");
            document.body.style.setProperty("--c2","#FF5E62");
            document.body.style.setProperty("--c3","#FF9A9E");
            document.body.style.setProperty("--c4","#FAD0C4");

            moodText.innerHTML =
            "🚀 Something exciting is waiting ahead!";
            break;
    }
}
</script>

</body>
</html>
